services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hediyeme-app
    working_dir: /var/www/html
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      # DB_* bilgileri .env dosyasından okunur (uzak veya yerel MySQL).
      # Eski davranış: aşağıdaki sabitler .env'yi ezip Docker içi "mysql" servisine bağlıyordu.
    # Uzak DB kullaniyorsan asagidaki satiri ve alttaki mysql servisini kaldirabilirsin.
    depends_on:
      - mysql
    command: >
      sh -c "composer install &&
             php artisan key:generate --force &&
             apache2-foreground"

  node:
    image: node:22-alpine
    container_name: hediyeme-node
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - node_modules_data:/var/www/html/node_modules
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0 --port 5173"

  mysql:
    image: mysql:8.4
    container_name: hediyeme-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: hediyeme
      MYSQL_USER: hediyeme_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  vendor_data:
  node_modules_data:

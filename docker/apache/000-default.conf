<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    # Docker / Compose'tan gelen DB ayarlarinin PHP (mod_php) tarafindan gorulmesi icin
    PassEnv DB_CONNECTION
    PassEnv DB_HOST
    PassEnv DB_PORT
    PassEnv DB_DATABASE
    PassEnv DB_USERNAME
    PassEnv DB_PASSWORD
    PassEnv DB_SOCKET
    PassEnv DB_URL

    <Directory /var/www/html/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        # Laravel: tum rotalari index.php'ye ver (.htaccess'e guvenmeden /urunler vb. calisir)
        FallbackResource /index.php
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
